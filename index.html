<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>XX活动策划 — 定制你的专属精彩时刻</title>
<style>
/* ========== 全局样式 ========== */
:root {
  --gold: #C9A96E;
  --gold-light: #e0d5c0;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --text: #333;
  --text2: #666;
  --text3: #999;
  --bg: #f5f5f5;
  --white: #fff;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  /* Animation tokens — consistent timing system */
  --dur-instant: 80ms;
  --dur-fast: 150ms;
  --dur-normal: 280ms;
  --dur-slow: 420ms;
  --dur-slower: 600ms;
  --ease-default: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --ease-bounce: cubic-bezier(0.68, -0.2, 0.27, 1.2);
  --ease-snappy: cubic-bezier(0.5, 0, 0, 1);
  --transition-default: var(--dur-normal) var(--ease-default);
  --transition-fast: var(--dur-fast) var(--ease-out);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ========== 顶部导航 ========== */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--dark);
  padding: 0 16px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background var(--dur-normal) var(--ease-default),
              border-bottom var(--dur-normal) var(--ease-default);
}
.nav-title { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: 2px; }
.nav-back {
  color: var(--gold);
  font-size: 14px;
  cursor: pointer;
  display: none;
  padding: 6px 0;
}
.nav-back.show { display: block; }

/* ========== 顶部 Banner ========== */
.banner {
  background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
  padding: 36px 24px 28px;
  text-align: center;
  animation: fadeInDown var(--dur-slow) var(--ease-out) both;
  position: relative;
  overflow: hidden;
}
/* 微妙的光点装饰 */
.banner::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 60%, rgba(201,169,110,0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 30%, rgba(201,169,110,0.04) 0%, transparent 50%);
  animation: float 8s ease-in-out infinite;
}
.banner-title {
  font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 4px; margin-bottom: 8px;
  animation: fadeInUp var(--dur-slow) var(--ease-out) 100ms both;
}
.banner-subtitle {
  font-size: 14px; color: rgba(255,255,255,0.65); letter-spacing: 2px;
  animation: fadeInUp var(--dur-slow) var(--ease-out) 200ms both;
}

/* ========== 分类筛选 ========== */
.category-bar {
  background: #fff;
  padding: 12px 0;
  overflow-x: auto;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 48px;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,0.04);
}
.category-bar::-webkit-scrollbar { display: none; }
.category-list { display: flex; padding: 0 8px; }
.cat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 18px;
  margin: 0 4px;
  border-radius: 14px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background var(--dur-normal) var(--ease-out),
              box-shadow var(--dur-normal) var(--ease-out),
              transform var(--dur-fast) var(--ease-out);
}
.cat-item:active { transform: scale(0.94); }
.cat-item.active { background: linear-gradient(135deg, #C9A96E, #b8944f); box-shadow: 0 4px 14px rgba(201,169,110,0.35); }
.cat-icon { font-size: 22px; margin-bottom: 2px; }
.cat-name { font-size: 13px; color: #666; }
.cat-item.active .cat-name { color: #fff; font-weight: 600; }

/* ========== 卡片列表 ========== */
.page-view { display: none; padding: 16px; padding-bottom: 40px; }
.page-view.active { display: block; }

.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  cursor: pointer;
  /* scroll-reveal initial state */
  opacity: 0;
  transform: translateY(28px);
}
.card.revealed {
  opacity: 1;
  transform: translateY(0);
  transition: opacity var(--dur-slow) var(--ease-out),
              transform var(--dur-slow) var(--ease-out),
              box-shadow var(--dur-normal) var(--ease-out);
}
.card:active {
  transform: scale(0.975);
  transition: transform var(--dur-fast) var(--ease-snappy);
}
@media (hover: hover) {
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  }
  .card.revealed:hover {
    transform: translateY(-4px);
  }
}

.card-cover-wrap {
  position: relative;
  width: 100%;
  height: 220px;
  background: #e0e0e0;
  overflow: hidden;
}
.card-cover {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-tags {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 6px;
}
.tag {
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  backdrop-filter: blur(6px);
}
.play-badge {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
  transition: transform var(--dur-normal) var(--ease-bounce),
              background var(--dur-normal) var(--ease-out);
}
.play-badge:hover {
  transform: translate(-50%,-50%) scale(1.12);
  background: rgba(0,0,0,0.65);
}
.play-badge::after { content: "▶"; color: #fff; font-size: 20px; margin-left: 3px; }

.card-body { padding: 16px 18px 18px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-title { font-size: 18px; font-weight: 700; color: var(--dark); flex:1; margin-right: 12px; }
.card-price { font-size: 15px; font-weight: 700; color: var(--gold); white-space: nowrap; }
.card-desc {
  font-size: 13px; color: var(--text3);
  line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 12px;
}
.card-cta { font-size: 13px; color: var(--gold); font-weight: 600; }

/* ========== 详情页 ========== */
.video-section { width: 100%; background: #000; }
.video-section video { width: 100%; height: 260px; display: block; }

.gallery-wrap { position: relative; width: 100%; height: 320px; background: #e0e0e0; overflow: hidden; }
.gallery-track {
  display: flex; height: 100%;
  transition: transform var(--dur-slow) var(--ease-snappy);
}
.gallery-slide { min-width: 100%; height: 100%; }
.gallery-slide img { width: 100%; height: 100%; object-fit: cover; animation: fadeIn var(--dur-slow) var(--ease-out) both; }
.gallery-dots {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px;
}
.gallery-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.5); transition: all .3s;
}
.gallery-dot.active { background: var(--gold); width: 16px; border-radius: 3px; }
.gallery-counter {
  position: absolute; bottom: 12px; right: 12px;
  background: rgba(0,0,0,0.5); color: #fff; font-size: 11px;
  padding: 4px 10px; border-radius: 12px; backdrop-filter: blur(6px);
}

.info-section {
  background: #fff; padding: 20px 18px; margin-bottom: 12px;
  opacity: 0; transform: translateY(20px);
  animation: fadeInUp var(--dur-normal) var(--ease-out) 80ms forwards;
}
.detail-title { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 10px; }
.detail-tags { display: flex; gap: 8px; margin-bottom: 14px; }
.detail-tags .tag { background: rgba(201,169,110,0.12); color: var(--gold); position: static; }
.detail-desc { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 16px; }
.price-range-row {
  display: flex; align-items: center;
  padding: 14px 16px;
  background: linear-gradient(135deg, rgba(201,169,110,0.06), rgba(201,169,110,0.12));
  border-radius: 10px; border-left: 4px solid var(--gold);
}
.price-label { font-size: 14px; color: #666; margin-right: 8px; }
.price-value { font-size: 20px; font-weight: 700; color: var(--gold); }

.price-section {
  background: #fff; padding: 20px 18px; margin-bottom: 12px;
  opacity: 0; transform: translateY(20px);
  animation: fadeInUp var(--dur-normal) var(--ease-out) 160ms forwards;
}
.price-section-title { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 16px; }
.price-cards { display: flex; flex-direction: column; gap: 14px; }

.pkg-card {
  padding: 20px 18px;
  border-radius: 14px;
  background: #fafafa;
  border: 2px solid #eee;
  position: relative;
  transition: transform var(--dur-normal) var(--ease-out),
              box-shadow var(--dur-normal) var(--ease-out),
              border-color var(--dur-normal) var(--ease-out);
}
@media (hover: hover) {
  .pkg-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  }
  .pkg-card.recommend:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(201,169,110,0.18);
  }
}
.pkg-card.recommend {
  background: linear-gradient(135deg, #fffdf7, #fef9ef);
  border-color: var(--gold);
  box-shadow: 0 2px 14px rgba(201,169,110,0.12);
}
.pkg-badge {
  position: absolute; top: -2px; right: 20px;
  background: linear-gradient(135deg, #C9A96E, #b8944f);
  color: #fff; font-size: 12px; padding: 5px 16px;
  border-radius: 0 0 10px 10px; font-weight: 600;
}

.pkg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.pkg-name { font-size: 16px; font-weight: 700; color: var(--dark); }
.pkg-price { font-size: 24px; font-weight: 700; color: var(--gold); }
.pkg-price small { font-size: 14px; }
.pkg-divider { height: 1px; background: #eee; margin-bottom: 14px; }
.pkg-card.recommend .pkg-divider { background: rgba(201,169,110,0.2); }
.pkg-items { display: flex; flex-direction: column; gap: 10px; }
.pkg-item { display: flex; align-items: center; font-size: 13px; color: #555; }
.pkg-check {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--gold); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; margin-right: 10px; flex-shrink: 0;
}

/* ========== 联系区域 ========== */
.contact-section {
  background: #fff; padding: 20px 18px; margin-bottom: 12px;
  opacity: 0; transform: translateY(20px);
  animation: fadeInUp var(--dur-normal) var(--ease-out) 240ms forwards;
}
.contact-desc { font-size: 13px; color: #999; line-height: 1.6; }

/* ========== 底部按钮 ========== */
.bottom-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  display: flex; gap: 12px;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: #fff;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
  z-index: 200;
}
.btn-call, .btn-wechat {
  flex: 1; height: 46px; border-radius: 23px;
  font-size: 15px; font-weight: 600; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: transform var(--dur-fast) var(--ease-out),
              box-shadow var(--dur-fast) var(--ease-out),
              opacity var(--dur-fast) var(--ease-out);
  position: relative;
  overflow: hidden;
}
/* Ripple pseudo */
.btn-call::after, .btn-wechat::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.25) 0%, transparent 70%);
  opacity: 0;
  transition: opacity var(--dur-instant) ease;
}
.btn-call:active, .btn-wechat:active {
  transform: scale(0.96);
  opacity: 0.9;
}
.btn-call:active::after, .btn-wechat:active::after {
  opacity: 1;
}
.btn-call { background: var(--dark); color: #fff; }
.btn-wechat { background: linear-gradient(135deg, #07c160, #06ad56); color: #fff; }
.btn-call:active, .btn-wechat:active { opacity: 0.85; }

.bottom-spacer { height: 80px; }

/* ========== Toast ========== */
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.85);
  background: rgba(0,0,0,0.78); color: #fff; padding: 14px 24px;
  border-radius: 10px; font-size: 14px; z-index: 999;
  pointer-events: none; opacity: 0;
  transition: opacity var(--dur-fast) var(--ease-out),
              transform var(--dur-fast) var(--ease-bounce);
}
.toast.show {
  opacity: 1;
  transform: translate(-50%,-50%) scale(1);
}

/* ========== 关键帧动画 ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.04); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
@keyframes drawCheck {
  from { stroke-dashoffset: 40; }
  to   { stroke-dashoffset: 0; }
}

/* Utility animation classes */
.anim-fade-in-up {
  animation: fadeInUp var(--dur-normal) var(--ease-out) both;
}
.anim-fade-in {
  animation: fadeIn var(--dur-normal) var(--ease-out) both;
}
.anim-scale-in {
  animation: scaleIn var(--dur-slow) var(--ease-bounce) both;
}
.anim-slide-right {
  animation: slideInRight var(--dur-normal) var(--ease-out) both;
}

/* Stagger delays */
.stagger-1 { animation-delay: 0ms; }
.stagger-2 { animation-delay: 60ms; }
.stagger-3 { animation-delay: 120ms; }
.stagger-4 { animation-delay: 180ms; }
.stagger-5 { animation-delay: 240ms; }
.stagger-6 { animation-delay: 300ms; }

/* ========== 空状态 ========== */
.empty { text-align: center; padding: 80px 20px; }
.empty-icon { font-size: 60px; margin-bottom: 12px; }
.empty-text { font-size: 16px; color: #999; margin-bottom: 6px; }
.empty-hint { font-size: 13px; color: #ccc; }

/* ========== 页面临时过渡态 ========== */
.page-view {
  display: none; padding: 16px; padding-bottom: 40px;
}
.page-view.active {
  display: block;
}
.page-view.slide-in {
  animation: slideInRight var(--dur-slow) var(--ease-out) both;
}
.page-view.slide-out {
  animation: fadeIn var(--dur-fast) var(--ease-in) both reverse;
}

/* ========== 底部栏浮动入场 ========== */
.bottom-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  display: flex; gap: 12px;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: #fff;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
  z-index: 200;
  transition: transform var(--dur-slow) var(--ease-out);
}
.bottom-bar.visible {
  transform: translateX(-50%) translateY(0);
}

/* ========== 无障碍：减少动画偏好 ========== */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .card {
    opacity: 1;
    transform: translateY(0);
  }
  .bottom-bar {
    transform: translateX(-50%) translateY(0);
  }
}
</style>
</head>

// ========== 状态 ==========
let activeCat = 'all';
let currentStyle = null;
let galleryTimer = null;
let galleryIndex = 0;

// ========== 工具函数 ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1800);
}

function getFiltered() {
  return activeCat === 'all' ? styles : styles.filter(s => s.category === activeCat);
}

// ========== 渲染分类栏 ==========
function renderCats() {
  const list = document.getElementById('catList');
  list.innerHTML = categories.map((c, i) => `
    <div class="cat-item ${c.id === activeCat ? 'active' : ''}" onclick="switchCat('${c.id}')" style="opacity:0; animation: fadeInUp var(--dur-normal) var(--ease-out) both; animation-delay: ${40 + i * 50}ms">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-name">${c.name}</span>
    </div>
  `).join('');
}

// ========== 渲染卡片 ==========
function renderCards() {
  const data = getFiltered();
  const container = document.getElementById('cardContainer');
  const empty = document.getElementById('emptyState');

  if (data.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  container.innerHTML = data.map(s => `
    <div class="card" onclick="openDetail(${s.id})">
      <div class="card-cover-wrap">
        <img class="card-cover" src="${s.cover}" alt="${s.title}" loading="lazy" onerror="this.style.display='none'">
        ${s.tags.length ? `<div class="card-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
        ${s.video ? `<div class="play-badge"></div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-header">
          <span class="card-title">${s.title}</span>
          <span class="card-price">${s.priceRange}</span>
        </div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-cta">查看详情 →</div>
      </div>
    </div>
  `).join('');

  // 为卡片设置入场动画
  requestAnimationFrame(() => initScrollReveal());
}

// ========== 滚动渐显观察器 ==========
let revealObserver = null;
function initScrollReveal() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

  document.querySelectorAll('.card').forEach((card, i) => {
    card.style.transitionDelay = `${i * 45}ms`;
    revealObserver.observe(card);
  });
}

// ========== 分类切换 ==========
function switchCat(id) {
  if (id === activeCat) return;
  activeCat = id;
  renderCats();
  renderCards();
}

// ========== 页面切换 ==========
function goBack() {
  // 先隐藏底部栏
  const bb = document.querySelector('#detailContent .bottom-bar');
  if (bb) bb.classList.remove('visible');

  document.getElementById('homePage').classList.add('active');
  document.getElementById('detailPage').classList.remove('active');
  document.getElementById('navBack').classList.remove('show');
  document.getElementById('navTitle').textContent = 'XX活动策划';
  document.querySelector('.nav-bar').style.borderBottom = '';
  clearInterval(galleryTimer);
  currentStyle = null;

  // 重新触发首页卡片渐显
  requestAnimationFrame(() => initScrollReveal());
}

// ========== 打开详情 ==========
function openDetail(id) {
  const s = styles.find(x => x.id === id);
  if (!s) return;
  currentStyle = s;
  galleryIndex = 0;

  document.getElementById('homePage').classList.remove('active');
  document.getElementById('detailPage').classList.add('active');
  document.getElementById('navBack').classList.add('show');
  document.getElementById('navTitle').textContent = s.title;
  document.querySelector('.nav-bar').style.borderBottom = '1px solid rgba(255,255,255,0.1)';

  const recIdx = 1; // 推荐第二个套餐

  let html = '';

  // 视频
  if (s.video) {
    html += `<div class="video-section"><video src="${s.video}" poster="${s.poster}" controls playsinline></video></div>`;
  }

  // 图片轮播
  html += `
  <div class="gallery-wrap">
    <div class="gallery-track" id="galleryTrack">${s.images.map((img,i) => `
      <div class="gallery-slide"><img src="${img}" alt="" loading="lazy" onclick="previewImg(${i})"></div>
    `).join('')}</div>
    <div class="gallery-dots" id="galleryDots">${s.images.map((_,i) => `
      <div class="gallery-dot ${i===0?'active':''}"></div>
    `).join('')}</div>
    ${s.images.length > 1 ? `<div class="gallery-counter" id="galleryCounter">1 / ${s.images.length}</div>` : ''}
  </div>`;

  // 详情信息
  html += `
  <div class="info-section">
    <div class="detail-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <div class="detail-desc">${s.desc}</div>
    <div class="price-range-row">
      <span class="price-label">价格区间：</span>
      <span class="price-value">${s.priceRange}</span>
    </div>
  </div>`;

  // 套餐
  html += `<div class="price-section">
    <div class="price-section-title">💰 套餐详情</div>
    <div class="price-cards">${s.prices.map((p,i) => `
      <div class="pkg-card ${i === recIdx ? 'recommend' : ''}">
        ${i === recIdx ? '<div class="pkg-badge">推荐</div>' : ''}
        <div class="pkg-header">
          <span class="pkg-name">${p.name}</span>
          <span class="pkg-price"><small>¥</small>${p.price.replace('¥','')}</span>
        </div>
        <div class="pkg-divider"></div>
        <div class="pkg-items">${p.items.map(svc => `
          <div class="pkg-item"><span class="pkg-check">✓</span>${svc}</div>
        `).join('')}</div>
      </div>
    `).join('')}</div>
  </div>`;

  // 联系
  html += `
  <div class="contact-section">
    <div class="price-section-title" style="margin-bottom:8px">📞 联系我们</div>
    <div class="contact-desc">对本次活动风格感兴趣？立即联系我们获取更多详情和专属优惠！</div>
  </div>`;

  // 底部按钮
  html += `
  <div class="bottom-spacer"></div>
  <div class="bottom-bar">
    <button class="btn-call" onclick="doCall()">📞 拨打电话</button>
    <button class="btn-wechat" onclick="doWechat()">💬 复制微信</button>
  </div>`;

  document.getElementById('detailContent').innerHTML = html;

  // 底部栏延迟滑入
  const bb = document.querySelector('#detailContent .bottom-bar');
  if (bb) {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => bb.classList.add('visible'));
    });
  }

  // 启动轮播
  startGallery(s);
}

// ========== 图片轮播 ==========
function startGallery(s) {
  clearInterval(galleryTimer);
  if (s.images.length <= 1) return;

  galleryTimer = setInterval(() => {
    galleryIndex = (galleryIndex + 1) % s.images.length;
    updateGallery(s);
  }, 3500);
}

function updateGallery(s) {
  const track = document.getElementById('galleryTrack');
  const dots = document.getElementById('galleryDots');
  const counter = document.getElementById('galleryCounter');
  if (track) track.style.transform = `translateX(-${galleryIndex * 100}%)`;
  if (dots) {
    dots.querySelectorAll('.gallery-dot').forEach((d,i) => d.classList.toggle('active', i === galleryIndex));
  }
  if (counter) counter.textContent = `${galleryIndex + 1} / ${s.images.length}`;
}

// 触摸滑动
let touchStartX = 0;
document.addEventListener('touchstart', e => {
  if (!currentStyle) return;
  const wrap = document.querySelector('.gallery-wrap');
  if (wrap && wrap.contains(e.target)) touchStartX = e.touches[0].clientX;
}, {passive:true});

document.addEventListener('touchend', e => {
  if (!currentStyle || !touchStartX) return;
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) galleryIndex = Math.min(galleryIndex + 1, currentStyle.images.length - 1);
    else galleryIndex = Math.max(galleryIndex - 1, 0);
    updateGallery(currentStyle);
  }
  touchStartX = 0;
});

function previewImg(idx) {
  if (!currentStyle) return;
  // 简单的大图预览：在新窗口打开
  window.open(currentStyle.images[idx], '_blank');
}

// ========== 联系操作 ==========
function doCall() {
  if (!currentStyle) return;
  const phone = currentStyle.contact.phone;
  if (confirm(`确认拨打：${phone}？`)) {
    window.location.href = `tel:${phone}`;
  }
}

function doWechat() {
  if (!currentStyle) return;
  const wechat = currentStyle.contact.wechat;
  navigator.clipboard.writeText(wechat).then(() => {
    alert(`微信号「${wechat}」已复制到剪贴板，请前往微信添加好友。`);
  }).catch(() => {
    // 降级方案
    const ta = document.createElement('textarea');
    ta.value = wechat;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert(`微信号「${wechat}」已复制到剪贴板，请前往微信添加好友。`);
  });
}

// ========== 初始化 ==========
renderCats();
renderCards();
